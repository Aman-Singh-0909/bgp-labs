name: bgp-hijack

topology:
  nodes:
    AS100:
      kind: linux
      image: frrouting/frr
      exec:
        - ip addr add 10.0.0.0/24 dev lo
    AS200:
      kind: linux
      image: frrouting/frr
    AS300:
      kind: linux
      image: frrouting/frr
      exec:
        - ip addr add 10.0.0.0/25 dev lo

  links:
    - endpoints: ["AS100:eth1", "AS200:eth1"]
    - endpoints: ["AS200:eth2", "AS300:eth1"]
